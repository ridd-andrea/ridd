<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aforismi dal Mondo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Jost:wght@200;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#141418;--border:rgba(255,255,255,.07);
  --text:#e8e4dc;--muted:rgba(232,228,220,.38);
  --accent:#c9a96e;--accent2:#7c6e58;--green:#4a9b6f;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.55}

/* Header */
header{padding:2.8rem 4rem 2rem;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:4rem;width:60px;height:2px;background:var(--accent)}
.logo{font-family:var(--serif);font-size:clamp(2rem,5vw,3.2rem);font-weight:300;letter-spacing:-.01em;line-height:1}
.logo em{font-style:italic;color:var(--accent)}
.tagline{font-size:.68rem;font-weight:200;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.counter{font-family:var(--serif);font-size:.95rem;color:var(--muted);font-style:italic;text-align:right}
.counter span{font-family:var(--sans);font-size:1.4rem;font-weight:500;color:var(--accent);font-style:normal}
.source-pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:.2rem .7rem;border-radius:99px;margin-top:.5rem;transition:color .3s,border-color .3s}
.source-pill.live{color:var(--green);border-color:var(--green)}
.source-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Layout */
main{flex:1;display:grid;grid-template-columns:1fr 300px;max-width:1140px;width:100%;margin:0 auto;padding:3rem 4rem}
.stage{display:flex;flex-direction:column;align-items:flex-start;gap:2.2rem;padding-right:3rem;border-right:1px solid var(--border)}

/* Buttons */
.btn-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--sans);font-size:.68rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;border:none;padding:.9rem 2rem;cursor:pointer;position:relative;transition:all .3s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.06);opacity:0;transition:opacity .3s;clip-path:inherit}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-singolo{color:var(--bg);background:var(--accent)}
.btn-singolo:hover{background:#d4b47a}
.btn-loop{color:var(--bg);background:var(--green)}
.btn-loop:hover{background:#5db882}
.btn-loop.stop{background:#b05050}
.btn-loop.stop:hover{background:#c96060}

/* Voce bar */
.voce-bar{display:none;align-items:center;gap:.5rem;font-size:.68rem;color:var(--green);font-weight:400;letter-spacing:.1em;text-transform:uppercase}
.voce-bar.show{display:flex}
.onde{display:flex;gap:2px;align-items:flex-end;height:16px}
.onde span{display:block;width:3px;background:var(--green);border-radius:2px;animation:onda 1s ease-in-out infinite}
.onde span:nth-child(1){height:5px;animation-delay:0s}
.onde span:nth-child(2){height:13px;animation-delay:.15s}
.onde span:nth-child(3){height:9px;animation-delay:.3s}
.onde span:nth-child(4){height:16px;animation-delay:.1s}
.onde span:nth-child(5){height:7px;animation-delay:.25s}
@keyframes onda{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}

/* Loader */
.loader{display:none;gap:.4rem;align-items:center;height:26px}
.loader span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.loader span:nth-child(2){animation-delay:.2s}
.loader span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.55);opacity:.25}40%{transform:scale(1);opacity:1}}

/* Quote card */
.quote-wrap{width:100%;min-height:210px;display:flex;flex-direction:column;justify-content:center}
.quote-card{position:relative;padding:2.5rem 2.5rem 2rem;background:var(--surface);border:1px solid var(--border);opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease,border-color .3s}
.quote-card.show{opacity:1;transform:translateY(0)}
.quote-card.speaking{border-color:rgba(74,155,111,.35)}
.quote-card::before,.quote-card::after{content:'';position:absolute;width:16px;height:16px;border-color:var(--accent);border-style:solid}
.quote-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.quote-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.quote-mark{font-family:var(--serif);font-size:7rem;line-height:.5;color:var(--accent);opacity:.1;position:absolute;top:1.5rem;left:1.8rem;font-style:italic;pointer-events:none;user-select:none}
.quote-text{font-family:var(--serif);font-size:clamp(1.15rem,2.4vw,1.55rem);font-weight:300;font-style:italic;line-height:1.72;color:var(--text);position:relative;z-index:1}
.quote-author{margin-top:1.4rem;font-size:.7rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.quote-author::before{content:'— '}
.quote-fonte{margin-top:.35rem;font-size:.63rem;color:var(--muted);letter-spacing:.1em}
.status-msg{font-family:var(--serif);font-size:1.05rem;font-style:italic;color:var(--muted);padding:1.5rem 0;line-height:1.6}

/* Sidebar */
.sidebar{padding-left:2.5rem;display:flex;flex-direction:column;gap:1.4rem}
.sidebar-title{font-size:.62rem;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.history-list{list-style:none;display:flex;flex-direction:column;gap:.85rem;overflow-y:auto;max-height:68vh;scrollbar-width:thin;scrollbar-color:var(--accent2) transparent;padding-right:.3rem}
.history-item{padding:.85rem 1rem;background:var(--surface);border-left:2px solid var(--accent2);opacity:0;transform:translateX(8px);animation:slideIn .4s ease forwards;transition:border-color .2s}
.history-item:hover{border-left-color:var(--accent)}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.h-text{font-family:var(--serif);font-size:.86rem;font-style:italic;line-height:1.5;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.h-author{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-top:.38rem}
.empty-hint{font-size:.8rem;font-style:italic;color:var(--muted);line-height:1.65}

/* Footer */
footer{padding:1.4rem 4rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.64rem;font-weight:200;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
footer a{color:var(--accent2);text-decoration:none}
footer a:hover{color:var(--accent)}

@media(max-width:768px){
  header{padding:2rem 1.5rem 1.5rem;flex-direction:column;align-items:flex-start;gap:.7rem}
  header::after{left:1.5rem}
  main{grid-template-columns:1fr;padding:2rem 1.5rem}
  .stage{padding-right:0;border-right:none;border-bottom:1px solid var(--border);padding-bottom:2rem}
  .sidebar{padding-left:0;padding-top:2rem}
  .history-list{max-height:38vh}
  .btn-row{flex-direction:column;width:100%}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body>

<header>
  <div>
    <p class="tagline">Saggezza dal mondo</p>
    <h1 class="logo">A<em>forismi</em></h1>
    <div class="source-pill" id="sourcePill">
      <span class="dot"></span>
      <span id="sourceLabel">in attesa</span>
    </div>
  </div>
  <div style="text-align:right">
    <div class="counter">Scoperti: <span id="countNum">0</span></div>
  </div>
</header>

<main>
  <section class="stage">
    <div class="btn-row">
      <button class="btn btn-singolo" id="btnSingolo">&#10022;&nbsp; Nuovo Aforisma</button>
      <button class="btn btn-loop"    id="btnLoop">&#9654;&nbsp; Lettura Continua</button>
      <div class="loader" id="loader">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="voce-bar" id="voceBar">
      <div class="onde"><span></span><span></span><span></span><span></span><span></span></div>
      In lettura vocale&hellip;
    </div>
    <div class="quote-wrap" id="quoteWrap">
      <p class="status-msg">Premi un pulsante per scoprire un aforisma.</p>
    </div>
  </section>

  <aside class="sidebar">
    <p class="sidebar-title">&#10022; Scoperti in questa sessione</p>
    <ul class="history-list" id="historyList">
      <li><p class="empty-hint">Nessun aforisma ancora.<br>Premi il pulsante per iniziare.</p></li>
    </ul>
  </aside>
</main>

<footer>
  <span>Aforismi &mdash; GitHub Pages</span>
  <span>
    <a href="https://quotable.io" target="_blank">quotable.io</a> &middot;
    <a href="https://zenquotes.io" target="_blank">zenquotes.io</a> &middot;
    dataset locale
  </span>
</footer>

<script>
// ════════════════════════════════════════════════════════════
//  STATO
// ════════════════════════════════════════════════════════════
const shown  = new Set();
let count    = 0;
let loopOn   = false;
let loopStop = false;
let localDB  = [];          // aforismi.json caricato una volta sola
const synth  = window.speechSynthesis;

// ════════════════════════════════════════════════════════════
//  DOM
// ════════════════════════════════════════════════════════════
const btnSingolo  = document.getElementById('btnSingolo');
const btnLoop     = document.getElementById('btnLoop');
const loader      = document.getElementById('loader');
const quoteWrap   = document.getElementById('quoteWrap');
const histList    = document.getElementById('historyList');
const countNum    = document.getElementById('countNum');
const voceBar     = document.getElementById('voceBar');
const sourcePill  = document.getElementById('sourcePill');
const sourceLabel = document.getElementById('sourceLabel');

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
const esc   = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rand  = arr => arr[Math.floor(Math.random() * arr.length)];

function setPill(label, live = true) {
  sourceLabel.textContent = label;
  sourcePill.className = 'source-pill' + (live ? ' live' : '');
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

// ════════════════════════════════════════════════════════════
//  CARICA aforismi.json (una volta sola, poi cache locale)
// ════════════════════════════════════════════════════════════
async function loadLocalDB() {
  if (localDB.length > 0) return localDB;
  // Carica tutti e tre i file in parallelo e li unisce
  const files = ['./aforismi.json', './aforismi2.json', './aforismi3.json', './aforismi4.json', './aforismi5.json', './aforismi6.json'];
  const results = await Promise.allSettled(
    files.map(url =>
      withTimeout(fetch(url), 6000)
        .then(r => r.ok ? r.json() : [])
        .catch(() => [])
    )
  );
  results.forEach(r => {
    if (r.status === 'fulfilled' && Array.isArray(r.value)) {
      localDB.push(...r.value);
    }
  });
  // Mescola l'array per variare l'ordine
  for (let i = localDB.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [localDB[i], localDB[j]] = [localDB[j], localDB[i]];
  }
  return localDB;
}

// ════════════════════════════════════════════════════════════
//  SORGENTI  — chiamate dirette dal browser, CORS supportato
// ════════════════════════════════════════════════════════════

// 1. quotable.io — ~2500 citazioni, CORS aperto
async function fromQuotable() {
  const res = await withTimeout(
    fetch('https://api.quotable.io/quotes/random?limit=1'),
    7000
  );
  if (!res.ok) throw new Error('quotable HTTP ' + res.status);
  const d = await res.json();
  if (!d[0]?.content) throw new Error('quotable: dati vuoti');
  return { testo: d[0].content, autore: d[0].author || 'Anonimo', fonte: 'quotable.io' };
}

// 2. zenquotes.io — ~10.000 citazioni, CORS aperto
async function fromZenquotes() {
  const res = await withTimeout(
    fetch('https://zenquotes.io/api/random'),
    7000
  );
  if (!res.ok) throw new Error('zenquotes HTTP ' + res.status);
  const d = await res.json();
  if (!d[0]?.q || d[0].q.includes('Too many')) throw new Error('zenquotes: limite');
  return { testo: d[0].q, autore: d[0].a || 'Anonimo', fonte: 'zenquotes.io' };
}

// 3. quoteslate.ir — migliaia di citazioni, CORS aperto
async function fromQuoteslate() {
  const res = await withTimeout(
    fetch('https://quoteslate.ir/api/quotes/random'),
    7000
  );
  if (!res.ok) throw new Error('quoteslate HTTP ' + res.status);
  const d = await res.json();
  if (!d.quote) throw new Error('quoteslate: dati vuoti');
  return { testo: d.quote, autore: d.author || 'Anonimo', fonte: 'quoteslate.ir' };
}

// 4. aforismi.json locale su GitHub (fallback garantito)
async function fromLocal() {
  const db = await loadLocalDB();
  if (!db.length) throw new Error('DB locale vuoto');
  // Scegli uno non ancora mostrato; se tutti mostrati, resetta
  const disponibili = db.filter(q => !shown.has(q.testo));
  const pool = disponibili.length > 0 ? disponibili : db;
  const q = rand(pool);
  return { testo: q.testo, autore: q.autore || 'Anonimo', fonte: 'dataset locale' };
}

// ════════════════════════════════════════════════════════════
//  FETCH PRINCIPALE  — ruota tra sorgenti, fallback locale
// ════════════════════════════════════════════════════════════
async function fetchAforisma() {
  // Ordine casuale tra le API esterne
  const apiEsterne = [fromQuotable, fromZenquotes, fromQuoteslate];
  apiEsterne.sort(() => Math.random() - 0.5);

  for (const fn of apiEsterne) {
    try {
      return await fn();
    } catch (_) {
      // questa API non ha funzionato, prova la prossima
    }
  }

  // Tutte le API esterne fallite → dataset locale su GitHub
  return await fromLocal();
}

// ════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════
function renderCard(testo, autore, fonte, speaking = false) {
  quoteWrap.innerHTML = `
    <div class="quote-card${speaking ? ' speaking' : ''}" id="qcard">
      <span class="quote-mark">&ldquo;</span>
      <p class="quote-text">${esc(testo)}</p>
      <p class="quote-author">${esc(autore)}</p>
      <p class="quote-fonte">&#127760; ${esc(fonte)}</p>
    </div>`;
  requestAnimationFrame(() =>
    requestAnimationFrame(() =>
      document.getElementById('qcard')?.classList.add('show')
    )
  );
}

function renderStatus(msg) {
  quoteWrap.innerHTML = `<p class="status-msg">${msg}</p>`;
}

function addHistory(testo, autore) {
  histList.querySelector('.empty-hint')?.parentElement?.remove();
  const li = document.createElement('li');
  li.className = 'history-item';
  li.innerHTML = `<p class="h-text">${esc(testo)}</p><p class="h-author">${esc(autore)}</p>`;
  histList.prepend(li);
}

// ════════════════════════════════════════════════════════════
//  SINTESI VOCALE
// ════════════════════════════════════════════════════════════
function leggi(testo, autore) {
  return new Promise(resolve => {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(`${testo}  …  di ${autore}`);
    utt.lang  = 'it-IT';
    utt.rate  = 0.88;
    utt.pitch = 1.02;
    const vocIT = synth.getVoices().find(v => v.lang.startsWith('it'));
    if (vocIT) utt.voice = vocIT;
    utt.onend = utt.onerror = () => resolve();
    synth.speak(utt);
  });
}

// ════════════════════════════════════════════════════════════
//  PULSANTE SINGOLO
// ════════════════════════════════════════════════════════════
async function mostraSingolo() {
  if (loopOn) fermaLoop();
  btnSingolo.disabled = btnLoop.disabled = true;
  loader.style.display = 'flex';
  quoteWrap.innerHTML  = '';

  try {
    const { testo, autore, fonte } = await fetchAforisma();
    shown.add(testo);
    count++;
    countNum.textContent = count;
    loader.style.display = 'none';
    renderCard(testo, autore, fonte);
    addHistory(testo, autore);
    setPill(fonte);
  } catch (e) {
    loader.style.display = 'none';
    renderStatus('⚠ Nessuna sorgente disponibile al momento.');
    setPill('errore', false);
  }

  btnSingolo.disabled = btnLoop.disabled = false;
}

// ════════════════════════════════════════════════════════════
//  LOOP LETTURA CONTINUA
// ════════════════════════════════════════════════════════════
function avviaLoop() {
  if (!window.speechSynthesis) {
    alert('Sintesi vocale non supportata. Usa Chrome o Edge.');
    return;
  }
  loopOn = true; loopStop = false;
  btnLoop.innerHTML = '&#9209;&nbsp; Ferma';
  btnLoop.classList.add('stop');
  btnSingolo.disabled = true;
  voceBar.classList.add('show');
  eseguiLoop();
}

function fermaLoop() {
  loopStop = true; loopOn = false;
  synth.cancel();
  btnLoop.innerHTML = '&#9654;&nbsp; Lettura Continua';
  btnLoop.classList.remove('stop');
  btnSingolo.disabled = false;
  voceBar.classList.remove('show');
  document.getElementById('qcard')?.classList.remove('speaking');
}

async function eseguiLoop() {
  while (!loopStop) {
    loader.style.display = 'flex';
    quoteWrap.innerHTML  = '';

    let risultato;
    try {
      risultato = await fetchAforisma();
    } catch (e) {
      loader.style.display = 'none';
      renderStatus('⚠ Nessuna sorgente disponibile. Loop interrotto.');
      fermaLoop(); break;
    }

    loader.style.display = 'none';
    if (loopStop) break;

    const { testo, autore, fonte } = risultato;
    if (shown.has(testo)) { await sleep(300); continue; }

    shown.add(testo);
    count++;
    countNum.textContent = count;
    renderCard(testo, autore, fonte, true);
    addHistory(testo, autore);
    setPill(fonte);

    await leggi(testo, autore);
    if (loopStop) break;
    await sleep(1800);
  }
}

// ════════════════════════════════════════════════════════════
//  EVENTI
// ════════════════════════════════════════════════════════════
btnSingolo.addEventListener('click', mostraSingolo);
btnLoop.addEventListener('click', () => loopOn ? fermaLoop() : avviaLoop());
window.addEventListener('beforeunload', () => { synth.cancel(); loopStop = true; });

// Pre-carica voci TTS e dataset locale
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
loadLocalDB(); // carica aforismi.json in background subito all'avvio
</script>
</body>
</html>
